<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The NBA Schedule — every game in your timezone</title>
    <meta
      name="description"
      content="An unofficial NBA season viewer: the full schedule in your timezone, live scores, conference standings, the playoff bracket, and league leaders."
    />
    <meta name="theme-color" content="#0f1420" />
    <link rel="canonical" href="https://ismayc.github.io/nba-schedule/" />

    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NBA Schedule" />

    <!-- Open Graph (link previews in Slack/Discord/iMessage/Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The NBA Schedule" />
    <meta property="og:title" content="The NBA Schedule — every game in your timezone" />
    <meta
      property="og:description"
      content="Every NBA game in your timezone — live scores, standings, playoff bracket, and stats."
    />
    <meta property="og:url" content="https://ismayc.github.io/nba-schedule/" />
    <meta property="og:image" content="https://ismayc.github.io/nba-schedule/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The NBA Schedule" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The NBA Schedule — every game in your timezone" />
    <meta
      name="twitter:description"
      content="Every NBA game in your timezone — live scores, standings, playoff bracket, and stats."
    />
    <meta name="twitter:image" content="https://ismayc.github.io/nba-schedule/og-image.png" />

    <script>
      // Resolve the theme before first paint so there is no flash of the wrong one.
      // System preference by default; an explicit choice wins and persists.
      ;(function () {
        try {
          var t = localStorage.getItem('nba:theme')
          if (!t)
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
